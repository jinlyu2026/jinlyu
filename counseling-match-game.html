<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理咨询术语连连看 / Counseling Terms Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .mode-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .mode-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .mode-btn.active {
            background: #ffd700;
            color: #333;
        }

        .game-area {
            display: none;
        }

        .game-area.active {
            display: block;
        }

        /* 单人模式样式 */
        .single-player {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 30px 0;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            transform-style: preserve-3d;
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            text-align: center;
            padding: 10px;
            word-break: break-word;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .card.selected {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #333;
            transform: scale(1.05);
        }

        .card.matched {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            cursor: default;
            animation: matchPulse 0.5s;
        }

        .card.matched:hover {
            transform: none;
        }

        @keyframes matchPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 团队模式样式 */
        .team-mode {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .team-setup {
            text-align: center;
            margin-bottom: 30px;
        }

        .team-input {
            margin: 20px 0;
        }

        .team-input input {
            padding: 10px 20px;
            font-size: 1.1em;
            border: 2px solid #667eea;
            border-radius: 10px;
            width: 80px;
            text-align: center;
        }

        .team-input label {
            font-size: 1.2em;
            color: #333;
            margin-right: 10px;
        }

        .team-scores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .team-score-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .team-score-card.active-team {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #333;
            transform: scale(1.05);
        }

        .team-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .team-score {
            font-size: 3em;
            font-weight: bold;
        }

        .current-turn {
            text-align: center;
            font-size: 1.5em;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }

        .controls {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #ffed4e 100%);
            color: #333;
        }

        .winner-announcement {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 1000;
            animation: popIn 0.5s;
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0); }
            to { transform: translate(-50%, -50%) scale(1); }
        }

        .winner-announcement h2 {
            font-size: 3em;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .winner-announcement p {
            font-size: 1.5em;
            color: #333;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }

        .level-selector {
            text-align: center;
            margin-bottom: 30px;
        }

        .level-btn {
            background: #f8f9fa;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 30px;
            margin: 0 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .level-btn:hover, .level-btn.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 心理咨询术语连连看</h1>
            <p>Counseling Terms Match Game</p>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="switchMode('single')">👤 单人模式 / Single Player</button>
            <button class="mode-btn" onclick="switchMode('team')">👥 团队竞赛 / Team Competition</button>
        </div>

        <!-- 单人模式 -->
        <div id="singleMode" class="game-area active">
            <div class="single-player">
                <div class="level-selector">
                    <button class="level-btn active" onclick="loadLevel(1)">基础术语 / Basic</button>
                    <button class="level-btn" onclick="loadLevel(2)">咨询技术 / Techniques</button>
                    <button class="level-btn" onclick="loadLevel(3)">高级概念 / Advanced</button>
                </div>

                <div class="game-info">
                    <div class="info-item">
                        <div class="info-label">得分 / Score</div>
                        <div class="info-value" id="singleScore">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">剩余配对 / Pairs Left</div>
                        <div class="info-value" id="singlePairs">8</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">时间 / Time</div>
                        <div class="info-value" id="singleTime">0:00</div>
                    </div>
                </div>

                <div class="card-grid" id="singleGrid"></div>

                <div class="controls">
                    <button class="btn" onclick="resetSingleGame()">重新开始 / Reset</button>
                </div>
            </div>
        </div>

        <!-- 团队模式 -->
        <div id="teamMode" class="game-area">
            <div class="team-mode">
                <div class="team-setup">
                    <h2>团队设置 / Team Setup</h2>
                    <div class="team-input">
                        <label>团队数量 / Number of Teams:</label>
                        <input type="number" id="teamCount" value="2" min="2" max="6" onchange="setupTeams()">
                    </div>
                    <button class="btn btn-success" onclick="startTeamGame()">开始竞赛 / Start Competition</button>
                </div>

                <div id="teamGameArea" style="display: none;">
                    <div class="team-scores" id="teamScores"></div>
                    
                    <div class="current-turn" id="currentTurn"></div>

                    <div class="card-grid" id="teamGrid"></div>

                    <div class="controls">
                        <button class="btn btn-warning" onclick="nextTeam()">下一个团队 / Next Team</button>
                        <button class="btn" onclick="resetTeamGame()">重新开始 / Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 获胜弹窗 -->
    <div class="overlay" id="overlay"></div>
    <div class="winner-announcement" id="winnerAnnouncement">
        <h2>🏆</h2>
        <p id="winnerText"></p>
        <button class="btn" onclick="closeWinner()" style="margin-top: 30px;">关闭 / Close</button>
    </div>

    <script>
        // 游戏数据 - 心理咨询术语
        const wordData = {
            1: [ // 基础术语
                { zh: "共情", en: "Empathy" },
                { zh: "倾听", en: "Listening" },
                { zh: "信任", en: "Trust" },
                { zh: "尊重", en: "Respect" },
                { zh: "真诚", en: "Genuineness" },
                { zh: "接纳", en: "Acceptance" },
                { zh: "理解", en: "Understanding" },
                { zh: "支持", en: "Support" }
            ],
            2: [ // 咨询技术
                { zh: "积极倾听", en: "Active Listening" },
                { zh: "开放式提问", en: "Open-ended Question" },
                { zh: "反射技巧", en: "Reflection" },
                { zh: "面质", en: "Confrontation" },
                { zh: "解释", en: "Interpretation" },
                { zh: "自我表露", en: "Self-disclosure" },
                { zh: "即时性", en: "Immediacy" },
                { zh: "沉默", en: "Silence" }
            ],
            3: [ // 高级概念
                { zh: "移情", en: "Transference" },
                { zh: "反移情", en: "Countertransference" },
                { zh: "阻抗", en: "Resistance" },
                { zh: "无条件积极关注", en: "Unconditional Positive Regard" },
                { zh: "一致性", en: "Congruence" },
                { zh: "同理心疲劳", en: "Compassion Fatigue" },
                { zh: "治疗联盟", en: "Therapeutic Alliance" },
                { zh: "自我觉察", en: "Self-awareness" }
            ]
        };

        let currentLevel = 1;
        let selectedCards = [];
        let matchedPairs = 0;
        let totalPairs = 8;
        let score = 0;
        let timer = 0;
        let timerInterval = null;
        let currentMode = 'single';

        // 团队模式变量
        let teams = [];
        let currentTeamIndex = 0;
        let teamGameActive = false;

        // 切换模式
        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.game-area').forEach(area => area.classList.remove('active'));
            if (mode === 'single') {
                document.getElementById('singleMode').classList.add('active');
                loadLevel(currentLevel);
            } else {
                document.getElementById('teamMode').classList.add('active');
            }
        }

        // 加载关卡
        function loadLevel(level) {
            currentLevel = level;
            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            resetSingleGame();
        }

        // 重置单人游戏
        function resetSingleGame() {
            selectedCards = [];
            matchedPairs = 0;
            score = 0;
            timer = 0;
            
            if (timerInterval) clearInterval(timerInterval);
            startTimer();
            
            document.getElementById('singleScore').textContent = '0';
            document.getElementById('singlePairs').textContent = wordData[currentLevel].length;
            totalPairs = wordData[currentLevel].length;
            
            createCards('singleGrid', wordData[currentLevel]);
        }

        // 开始计时器
        function startTimer() {
            timerInterval = setInterval(() => {
                timer++;
                const minutes = Math.floor(timer / 60);
                const seconds = timer % 60;
                document.getElementById('singleTime').textContent = 
                    `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // 创建卡片
        function createCards(gridId, words) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';
            
            // 创建配对卡片
            let cards = [];
            words.forEach((word, index) => {
                cards.push({
                    id: index,
                    text: word.zh,
                    type: 'zh',
                    matchId: index
                });
                cards.push({
                    id: index + words.length,
                    text: word.en,
                    type: 'en',
                    matchId: index
                });
            });
            
            // 洗牌
            cards = shuffle(cards);
            
            // 创建卡片元素
            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.textContent = card.text;
                cardEl.dataset.id = card.id;
                cardEl.dataset.matchId = card.matchId;
                cardEl.dataset.type = card.type;
                cardEl.onclick = () => selectCard(cardEl);
                grid.appendChild(cardEl);
            });
        }

        // 选择卡片
        function selectCard(cardEl) {
            if (cardEl.classList.contains('matched') || cardEl.classList.contains('selected')) {
                return;
            }

            if (currentMode === 'team' && !teamGameActive) {
                return;
            }

            cardEl.classList.add('selected');
            selectedCards.push(cardEl);

            if (selectedCards.length === 2) {
                checkMatch();
            }
        }

        // 检查匹配
        function checkMatch() {
            const [card1, card2] = selectedCards;
            const match1 = card1.dataset.matchId;
            const match2 = card2.dataset.matchId;
            const type1 = card1.dataset.type;
            const type2 = card2.dataset.type;

            // 必须是不同类型的卡片且matchId相同
            if (match1 === match2 && type1 !== type2) {
                // 匹配成功
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    card1.classList.remove('selected');
                    card2.classList.remove('selected');
                    
                    selectedCards = [];
                    
                    if (currentMode === 'single') {
                        score += 10;
                        matchedPairs++;
                        document.getElementById('singleScore').textContent = score;
                        document.getElementById('singlePairs').textContent = totalPairs - matchedPairs;
                        
                        if (matchedPairs === totalPairs) {
                            clearInterval(timerInterval);
                            setTimeout(() => {
                                alert(`🎉 恭喜通关！\n得分: ${score}\n时间: ${document.getElementById('singleTime').textContent}`);
                            }, 500);
                        }
                    } else {
                        // 团队模式加分
                        teams[currentTeamIndex].score += 10;
                        matchedPairs++;
                        updateTeamScores();
                        
                        if (matchedPairs === totalPairs) {
                            endTeamGame();
                        }
                    }
                }, 500);
            } else {
                // 匹配失败
                setTimeout(() => {
                    card1.classList.remove('selected');
                    card2.classList.remove('selected');
                    selectedCards = [];
                    
                    if (currentMode === 'team') {
                        // 团队模式自动切换
                        setTimeout(() => nextTeam(), 1000);
                    }
                }, 1000);
            }
        }

        // 洗牌函数
        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // 设置团队
        function setupTeams() {
            const count = parseInt(document.getElementById('teamCount').value);
            teams = [];
            for (let i = 0; i < count; i++) {
                teams.push({
                    name: `团队 ${String.fromCharCode(65 + i)}`,
                    score: 0
                });
            }
        }

        // 开始团队游戏
        function startTeamGame() {
            setupTeams();
            currentTeamIndex = 0;
            matchedPairs = 0;
            teamGameActive = true;
            
            document.getElementById('teamGameArea').style.display = 'block';
            
            updateTeamScores();
            updateCurrentTurn();
            createCards('teamGrid', wordData[1]); // 团队模式使用基础术语
        }

        // 更新团队分数显示
        function updateTeamScores() {
            const container = document.getElementById('teamScores');
            container.innerHTML = '';
            
            teams.forEach((team, index) => {
                const card = document.createElement('div');
                card.className = `team-score-card ${index === currentTeamIndex ? 'active-team' : ''}`;
                card.innerHTML = `
                    <div class="team-name">${team.name}</div>
                    <div class="team-score">${team.score}</div>
                `;
                container.appendChild(card);
            });
        }

        // 更新当前回合显示
        function updateCurrentTurn() {
            document.getElementById('currentTurn').textContent = 
                `当前回合 / Current Turn: ${teams[currentTeamIndex].name}`;
        }

        // 下一个团队
        function nextTeam() {
            if (!teamGameActive) return;
            
            currentTeamIndex = (currentTeamIndex + 1) % teams.length;
            updateTeamScores();
            updateCurrentTurn();
        }

        // 结束团队游戏
        function endTeamGame() {
            teamGameActive = false;
            
            // 找出获胜团队
            let maxScore = 0;
            let winners = [];
            teams.forEach(team => {
                if (team.score > maxScore) {
                    maxScore = team.score;
                    winners = [team];
                } else if (team.score === maxScore) {
                    winners.push(team);
                }
            });
            
            // 显示获胜者
            const overlay = document.getElementById('overlay');
            const announcement = document.getElementById('winnerAnnouncement');
            
            if (winners.length === 1) {
                document.getElementById('winnerText').textContent = 
                    `恭喜 ${winners[0].name} 获胜！\n得分: ${winners[0].score}`;
            } else {
                document.getElementById('winnerText').textContent = 
                    `平局！${winners.map(w => w.name).join(' 和 ')} 得分相同: ${winners[0].score}`;
            }
            
            overlay.style.display = 'block';
            announcement.style.display = 'block';
        }

        // 关闭获胜弹窗
        function closeWinner() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('winnerAnnouncement').style.display = 'none';
        }

        // 重置团队游戏
        function resetTeamGame() {
            document.getElementById('teamGameArea').style.display = 'none';
            teams = [];
            currentTeamIndex = 0;
            matchedPairs = 0;
            teamGameActive = false;
        }

        // 页面加载时初始化
        window.onload = () => {
            loadLevel(1);
            setupTeams();
        };
    </script>
</body>
</html>
